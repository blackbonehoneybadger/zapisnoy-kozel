<svg viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="800" fill="#08090b"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#10130f"/>
      <stop offset="100%" stop-color="#08090b"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <linearGradient id="shimmer" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#cdb077" stop-opacity="0"/>
      <stop offset="100%" stop-color="#cdb077" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="0" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="400" height="800" fill="url(#bg)"/>
  <ellipse cx="100" cy="200" rx="150" ry="80" fill="#0d3829" opacity="0.2" filter="url(#blur)"/>
  <ellipse cx="300" cy="500" rx="120" ry="70" fill="#0d3829" opacity="0.2" filter="url(#blur)"/>
  <ellipse cx="150" cy="700" rx="180" ry="90" fill="#0d3829" opacity="0.2" filter="url(#blur)"/>
  <rect x="0" y="0" width="400" height="800" fill="url(#shimmer)"/>
  <rect x="0" y="0" width="400" height="800" fill="white" filter="url(#grain)" opacity="0.035" mix-blend-mode="soft-light"/>
</svg>