<svg viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paperBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2016"/>
      <stop offset="55%" stop-color="#1e1710"/>
      <stop offset="100%" stop-color="#16110b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d9a0"/>
      <stop offset="50%" stop-color="#e0a43b"/>
      <stop offset="100%" stop-color="#bb5c3c"/>
    </linearGradient>
    <radialGradient id="backGlow" cx="50%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#e0a43b" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#3a5e42" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="300" height="420" fill="url(#paperBase)"/>
  <ellipse cx="150" cy="196" rx="130" ry="160" fill="url(#backGlow)"/>

  <!-- двойная золотая рамка -->
  <rect x="8" y="8" width="284" height="404" rx="18" fill="none" stroke="url(#gold)" stroke-width="2.4" opacity="0.85"/>
  <rect x="17" y="17" width="266" height="386" rx="12" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.4"/>

  <!-- кофейное зерно-эмблема в центре -->
  <g transform="translate(150,186)" fill="none" stroke="url(#gold)" stroke-width="2.6" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="46" ry="62" transform="rotate(-22)"/>
    <path d="M0 -56 C-13 -18 -13 40 0 58" transform="rotate(-22)" opacity="0.75"/>
  </g>
  <!-- пар -->
  <g transform="translate(150,96)" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.55">
    <path d="M-24 0c7-8 7-17 0-25s-7-17 0-25"/>
    <path d="M0 4c7-8 7-17 0-25s-7-17 0-25"/>
    <path d="M24 0c7-8 7-17 0-25s-7-17 0-25"/>
  </g>

  <!-- цифра 8 под эмблемой -->
  <text x="150" y="330" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="url(#gold)" opacity="0.92">8</text>

  <!-- верхний блик -->
  <rect x="8" y="8" width="284" height="120" rx="18" fill="white" opacity="0.05"/>
</svg>
