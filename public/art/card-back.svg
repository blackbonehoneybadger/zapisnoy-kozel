<svg viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A2A1A"/>
      <stop offset="55%" stop-color="#3D1C12"/>
      <stop offset="100%" stop-color="#1A0F0A"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8963D"/>
      <stop offset="50%" stop-color="#E0B85A"/>
      <stop offset="100%" stop-color="#C8963D"/>
    </linearGradient>
    <pattern id="lattice" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(45 14 14)">
      <path d="M0 14 H28 M14 0 V28" stroke="#C8963D" stroke-width="0.7" opacity="0.35"/>
      <circle cx="14" cy="14" r="2.2" fill="none" stroke="#C8963D" stroke-width="0.7" opacity="0.45"/>
    </pattern>
    <radialGradient id="dawn" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#C8963D" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#5A2A1A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="300" height="420" rx="18" fill="url(#backBase)"/>
  <rect x="14" y="14" width="272" height="392" rx="12" fill="url(#lattice)"/>
  <ellipse cx="150" cy="200" rx="110" ry="140" fill="url(#dawn)"/>

  <!-- double gold frame -->
  <rect x="10" y="10" width="280" height="400" rx="16" fill="none" stroke="url(#goldLine)" stroke-width="2" opacity="0.85"/>
  <rect x="18" y="18" width="264" height="384" rx="12" fill="none" stroke="url(#goldLine)" stroke-width="0.8" opacity="0.4"/>

  <!-- geometric crest interlocking diamonds -->
  <g transform="translate(150 195)" stroke="url(#goldLine)" fill="none" stroke-width="1.6" opacity="0.9">
    <path d="M0 -58 L42 0 L0 58 L-42 0 Z"/>
    <path d="M0 -38 L28 0 L0 38 L-28 0 Z"/>
    <path d="M0 -18 L14 0 L0 18 L-14 0 Z"/>
    <circle cx="0" cy="0" r="6" fill="#C8963D" stroke="none"/>
    <!-- side lozenges -->
    <path d="M-62 -20 L-42 0 L-62 20 L-82 0 Z" opacity="0.7"/>
    <path d="M62 -20 L82 0 L62 20 L42 0 Z" opacity="0.7"/>
    <path d="M-20 -62 L0 -42 L20 -62 L0 -82 Z" opacity="0.7"/>
    <path d="M-20 62 L0 82 L20 62 L0 42 Z" opacity="0.7"/>
  </g>

  <!-- coffee bean seal -->
  <g transform="translate(150 320) rotate(-24)">
    <ellipse cx="0" cy="0" rx="18" ry="26" fill="#C8963D" opacity="0.9"/>
    <path d="M0 -22c-4.5 7-4.5 37 0 44" stroke="#1A0F0A" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.55"/>
  </g>

  <text x="150" y="372" text-anchor="middle" font-family="Montserrat, Georgia, serif" font-size="18" font-weight="600" fill="#C8963D" letter-spacing="6" opacity="0.85">DOFFA</text>

  <rect x="10" y="10" width="280" height="100" rx="16" fill="white" opacity="0.04"/>
</svg>
