<svg viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2016"/>
      <stop offset="45%" stop-color="#1e1710"/>
      <stop offset="100%" stop-color="#16110b"/>
    </linearGradient>
    <radialGradient id="dawnGlow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#e0a43b" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#bb5c3c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d9a0"/>
      <stop offset="45%" stop-color="#e0a43b"/>
      <stop offset="100%" stop-color="#bd8329"/>
    </linearGradient>
    <linearGradient id="crestFace" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2d9a0"/>
      <stop offset="55%" stop-color="#e0a43b"/>
      <stop offset="100%" stop-color="#3a5e42"/>
    </linearGradient>
    <radialGradient id="crestSheen" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="300" height="420" fill="url(#backBase)"/>
  <ellipse cx="150" cy="190" rx="118" ry="148" fill="url(#dawnGlow)"/>

  <!-- двойная шампань-рамка -->
  <rect x="10" y="10" width="280" height="400" rx="18" fill="none" stroke="url(#goldFrame)" stroke-width="1.8" opacity="0.75"/>
  <rect x="18" y="18" width="264" height="384" rx="13" fill="none" stroke="url(#goldFrame)" stroke-width="0.7" opacity="0.28"/>

  <!-- мягкие угловые блики -->
  <g fill="#f2d9a0" opacity="0.12">
    <circle cx="42" cy="48" r="2.2"/>
    <circle cx="258" cy="48" r="2.2"/>
    <circle cx="42" cy="372" r="2.2"/>
    <circle cx="258" cy="372" r="2.2"/>
  </g>

  <!-- герб: кофейное зерно DOFFA -->
  <g transform="translate(150 186)">
    <ellipse cx="0" cy="0" rx="46" ry="58" fill="rgba(224,164,59,0.08)"/>
    <g transform="rotate(-24)">
      <ellipse cx="0" cy="0" rx="28" ry="38" fill="url(#crestFace)"/>
      <ellipse cx="0" cy="0" rx="28" ry="38" fill="url(#crestSheen)"/>
      <path d="M0 -34c-7 11-7 57 0 68" stroke="#1b140c" stroke-opacity="0.5" stroke-width="3.2" stroke-linecap="round" fill="none"/>
      <ellipse cx="0" cy="0" rx="28" ry="38" stroke="#f2d9a0" stroke-opacity="0.45" stroke-width="1" fill="none"/>
    </g>
  </g>

  <!-- цифра 8 -->
  <text x="150" y="318" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="url(#goldFrame)" opacity="0.78">8</text>

  <!-- верхний глянец -->
  <rect x="10" y="10" width="280" height="110" rx="18" fill="white" opacity="0.04"/>
</svg>
