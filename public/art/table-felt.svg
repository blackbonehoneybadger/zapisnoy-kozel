<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="felt" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0d3829"/>
      <stop offset="100%" stop-color="#061a15"/>
    </radialGradient>
    <filter id="fabric">
      <feTurbulence type="fractalNoise" baseFrequency="0.65 0.9" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="graynoise"/>
      <feDisplacementMap in="SourceGraphic" in2="graynoise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="vignette_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="600" height="600" fill="url(#felt)"/>
  <rect x="0" y="0" width="600" height="600" fill="white" filter="url(#fabric)" opacity="0.5" style="mix-blend-mode:multiply;"/>
  <rect x="0" y="0" width="600" height="600" fill="url(#vignette_grad)" opacity="0.5"/>
  <ellipse cx="300" cy="300" rx="200" ry="140" fill="none" stroke="#cdb077" stroke-width="0.8" opacity="0.1"/>
</svg>