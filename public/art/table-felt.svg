<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="felt" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#4a2a8f"/>
      <stop offset="42%" stop-color="#2e1560"/>
      <stop offset="100%" stop-color="#0e0526"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="50%" cy="108%" r="65%">
      <stop offset="0%" stop-color="#19d68a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#19d68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="fabric">
      <feTurbulence type="fractalNoise" baseFrequency="0.65 0.9" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="graynoise"/>
      <feDisplacementMap in="SourceGraphic" in2="graynoise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="vignette_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="600" height="600" fill="url(#felt)"/>
  <rect x="0" y="0" width="600" height="600" fill="white" filter="url(#fabric)" opacity="0.35" style="mix-blend-mode:multiply;"/>
  <rect x="0" y="0" width="600" height="600" fill="url(#mintGlow)"/>
  <rect x="0" y="0" width="600" height="600" fill="url(#vignette_grad)" opacity="0.42"/>
  <ellipse cx="300" cy="300" rx="205" ry="145" fill="none" stroke="#c4a5ff" stroke-width="1" opacity="0.16"/>
  <ellipse cx="300" cy="300" rx="196" ry="137" fill="none" stroke="#19d68a" stroke-width="0.6" opacity="0.10"/>
</svg>
