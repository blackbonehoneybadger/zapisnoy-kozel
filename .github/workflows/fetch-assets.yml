# Одноразовый помощник: скачивает кандидатов логотипа (Higgsfield CDN)
# в public/art/gen/ и коммитит в ветку. Удаляется после выбора финала.
name: Fetch generated art assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/zapisnoy-kozel-game-b217qd

      - name: Download assets
        run: |
          set -e
          mkdir -p public/art/gen
          base="https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc"
          curl -fsSo public/art/gen/logo1.png "$base/hf_20260711_212701_56818753-fb8a-4118-b66d-170759a240b8.png"
          curl -fsSo public/art/gen/logo2.png "$base/hf_20260711_212701_bdbff789-340a-4ad3-8a6c-6af1ee716f53.png"
          curl -fsSo public/art/gen/logo3.png "$base/hf_20260711_212705_2d714a67-ee05-4f65-8400-ccf3413dd34f.png"
          curl -fsSo public/art/gen/logo4.png "$base/hf_20260711_212705_c5b5e58c-7558-4dc2-bf7e-0fb6ea271548.png"
          ls -la public/art/gen/

      - name: Commit assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/art/gen
          git commit -m "chore: кандидаты логотипа Crazy 8 (Higgsfield)"
          git push origin claude/zapisnoy-kozel-game-b217qd
