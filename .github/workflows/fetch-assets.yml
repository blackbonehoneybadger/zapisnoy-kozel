name: fetch-assets (temporary)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download candidate images
        run: |
          set -e
          mkdir -p public/art/_gen
          curl -sSL -o public/art/_gen/bean-cut.png "https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc/hf_20260714_141525_713638f8-db44-4403-9caf-c0e5ded0770e.png"
          curl -sSL -o public/art/_gen/bean-gold-cut.png "https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc/hf_20260714_141535_f99603b1-e907-4ed3-b7b0-5efe776c2c50.png"
          ls -la public/art/_gen

      - name: Commit assets
        run: |
          git config user.name "asset-fetch-bot"
          git config user.email "actions@github.com"
          git add public/art/_gen
          git commit -m "chore: fetch DOFFA bean particle assets (temporary)" || echo "no changes"
          git push
