name: fetch-assets (temporary)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download candidate images
        run: |
          set -e
          mkdir -p public/art/_gen
          curl -sSL -o public/art/_gen/gold-foil-a.png "https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc/hf_20260714_135435_2f53782a-20c9-41b1-979f-679e21d12a35.png"
          curl -sSL -o public/art/_gen/gold-foil-b.png "https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc/hf_20260714_135435_a98b372c-7fda-4502-987c-ac13fd6568b2.png"
          curl -sSL -o public/art/_gen/leather-a.png "https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc/hf_20260714_135452_aed7755b-04ff-4563-a46d-a047af1744c3.png"
          curl -sSL -o public/art/_gen/leather-b.png "https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc/hf_20260714_135454_a1dd5b02-16a2-4ba2-a7ae-7fabcb5eeaa8.png"
          ls -la public/art/_gen

      - name: Commit assets
        run: |
          git config user.name "asset-fetch-bot"
          git config user.email "actions@github.com"
          git add public/art/_gen
          git commit -m "chore: fetch DOFFA button textures (temporary)" || echo "no changes"
          git push
