# Одноразовый помощник: скачивает DOFFA-ассеты (Higgsfield CDN) в public/art/gen/.
name: Fetch generated art assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/zapisnoy-kozel-game-b217qd
      - name: Download assets
        run: |
          set -e
          mkdir -p public/art/gen
          base="https://d8j0ntlcm91z4.cloudfront.net/user_2wpHpzXpvrW7bw4za2Omx4tlMCc"
          curl -fsSo public/art/gen/dbg1.png "$base/hf_20260713_162138_d5cc42f4-584c-4e41-b7d9-88edf796aebb.png"
          curl -fsSo public/art/gen/dbg2.png "$base/hf_20260713_162138_4e67a08b-8991-4793-b676-0dd853a94dd8.png"
          curl -fsSo public/art/gen/dcb1.png "$base/hf_20260713_162146_511122bd-864b-43a1-b0f5-8604d5e4d62b.png"
          curl -fsSo public/art/gen/dcb2.png "$base/hf_20260713_162146_7af011ff-5317-4645-a490-614cd83e2861.png"
          ls -la public/art/gen/
      - name: Commit assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/art/gen
          git commit -m "chore: DOFFA-ассеты (Higgsfield кандидаты)"
          git push origin claude/zapisnoy-kozel-game-b217qd
