name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/zapisnoy-kozel-game-b217qd
    paths-ignore:
      - '**.md'

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (Capacitor mode)
        run: npm run build
        env:
          CAP_BUILD: '1'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk "out/zapisnoy-kozel-${{ github.run_number }}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "out/zapisnoy-kozel-latest.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapisnoy-kozel-apk
          path: out/zapisnoy-kozel-${{ github.run_number }}.apk
          if-no-files-found: error

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Записной Козёл — Android APK
          body: |
            📦 Установочный APK для Android (debug-сборка, устанавливается напрямую).

            **Как установить:**
            1. Скачайте `zapisnoy-kozel-latest.apk` ниже.
            2. На телефоне разрешите установку из неизвестных источников.
            3. Откройте файл и нажмите «Установить».

            Сборка #${{ github.run_number }} · коммит ${{ github.sha }}
          files: |
            out/zapisnoy-kozel-latest.apk
            out/zapisnoy-kozel-${{ github.run_number }}.apk
          make_latest: true
