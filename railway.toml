# Railway конфигурация для WebSocket-сервера «Записной Козёл».
# Dockerfile берём из server/Dockerfile (контекст — корень репо, нужен src/game).

[build]
dockerfilePath = "server/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
